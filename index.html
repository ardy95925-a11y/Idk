<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BoardNotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --glass: rgba(18,18,22,0.72);
    --glass-border: rgba(255,255,255,0.09);
    --glass-border-bright: rgba(255,255,255,0.18);
    --accent: #c8f0a0;
    --accent-dim: rgba(200,240,160,0.18);
    --accent-glow: rgba(200,240,160,0.08);
    --text: rgba(255,255,255,0.88);
    --text-dim: rgba(255,255,255,0.38);
    --text-muted: rgba(255,255,255,0.18);
    --danger: rgba(255,100,100,0.75);
    --radius: 16px;
    --radius-sm: 10px;
    --panel-gap: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; opacity: 0.5;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -20%; left: 50%; transform: translateX(-50%);
    width: 70vw; height: 50vh;
    background: radial-gradient(ellipse, rgba(200,240,160,0.04) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  #app {
    position: relative; z-index: 1;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    padding: 14px var(--panel-gap) var(--panel-gap);
    gap: var(--panel-gap);
  }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    height: 44px; flex-shrink: 0;
    padding: 0 4px;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 300; letter-spacing: 0.04em;
    color: var(--text);
  }
  .logo span { color: var(--accent); font-style: italic; }

  .header-actions {
    display: flex; gap: 8px; align-items: center;
  }

  .pill-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface);
    border: 1px solid var(--glass-border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.06em;
    padding: 7px 14px; border-radius: 100px;
    cursor: pointer; transition: all 0.2s ease;
    backdrop-filter: blur(12px);
    white-space: nowrap;
  }
  .pill-btn:hover { background: var(--surface-hover); border-color: var(--glass-border-bright); color: var(--text); }
  .pill-btn.accent {
    background: var(--accent-dim); border-color: rgba(200,240,160,0.35);
    color: var(--accent);
  }
  .pill-btn.accent:hover { background: rgba(200,240,160,0.28); }
  .pill-btn svg { width: 13px; height: 13px; }

  /* ── MAIN LAYOUT ── */
  .main {
    flex: 1; display: flex; gap: var(--panel-gap);
    min-height: 0;
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    display: flex; flex-direction: column; gap: var(--panel-gap);
    width: 52%; flex-shrink: 0;
  }

  /* ── PHOTO VIEWER ── */
  .photo-viewer {
    flex: 1;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: blur(20px);
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    min-height: 0;
  }

  .photo-viewer .empty-state {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    pointer-events: none;
  }
  .photo-viewer .empty-state svg { opacity: 0.15; width: 48px; height: 48px; }
  .photo-viewer .empty-state p {
    font-size: 12px; color: var(--text-muted); letter-spacing: 0.08em;
  }

  #photo-display {
    width: 100%; height: 100%; object-fit: contain;
    display: none;
    touch-action: none;
    cursor: zoom-in;
    transition: transform 0.1s ease;
    transform-origin: center center;
  }

  /* zoom indicator */
  .zoom-badge {
    position: absolute; bottom: 12px; right: 12px;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
    border: 1px solid var(--glass-border);
    border-radius: 100px; padding: 4px 10px;
    font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em;
    display: none;
    transition: opacity 0.3s;
  }

  /* ── CAMERA OVERLAY ── */
  #camera-overlay {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
  }
  #camera-overlay.active { display: flex; }

  #camera-video {
    width: 100%; height: 100%; object-fit: cover;
  }

  .camera-controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px;
    display: flex; align-items: center; justify-content: center;
    gap: 28px;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
  }

  .shutter-btn {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(255,255,255,0.92);
    border: 3px solid rgba(255,255,255,0.5);
    cursor: pointer; transition: transform 0.1s, background 0.1s;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.15);
    flex-shrink: 0;
    position: relative;
  }
  .shutter-btn:active { transform: scale(0.92); background: var(--accent); }

  .cam-cancel-btn {
    position: absolute; top: 12px; right: 12px;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 100px;
    color: rgba(255,255,255,0.75); font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.05em;
    padding: 6px 14px; cursor: pointer;
  }

  /* ── THUMBNAIL STRIP ── */
  .thumb-strip {
    height: 76px; flex-shrink: 0;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    backdrop-filter: blur(20px);
    display: flex; align-items: center;
    padding: 0 10px; gap: 8px;
    overflow-x: auto; overflow-y: hidden;
  }
  .thumb-strip::-webkit-scrollbar { height: 3px; }
  .thumb-strip::-webkit-scrollbar-track { background: transparent; }
  .thumb-strip::-webkit-scrollbar-thumb { background: var(--glass-border-bright); border-radius: 2px; }

  .thumb-strip .empty-label {
    font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em;
    white-space: nowrap; padding-left: 4px;
  }

  .thumb {
    width: 54px; height: 54px; flex-shrink: 0;
    border-radius: 8px; object-fit: cover;
    border: 1.5px solid var(--glass-border);
    cursor: pointer; transition: all 0.2s;
    opacity: 0.65;
  }
  .thumb:hover { opacity: 1; border-color: var(--glass-border-bright); }
  .thumb.active { opacity: 1; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }

  .thumb-wrapper {
    position: relative; flex-shrink: 0;
  }
  .thumb-delete {
    position: absolute; top: -5px; right: -5px;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(30,30,30,0.9); border: 1px solid rgba(255,100,100,0.4);
    color: var(--danger); font-size: 9px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0; transition: opacity 0.15s;
  }
  .thumb-wrapper:hover .thumb-delete { opacity: 1; }

  /* ── RIGHT PANEL — NOTES ── */
  .right-panel {
    flex: 1; display: flex; flex-direction: column; gap: 0;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: blur(20px);
    overflow: hidden; min-height: 0;
  }

  .notes-header {
    padding: 14px 18px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--glass-border);
    flex-shrink: 0;
  }

  .notes-title-input {
    background: none; border: none; outline: none;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 400;
    color: var(--text); width: 100%;
    letter-spacing: 0.02em;
  }
  .notes-title-input::placeholder { color: var(--text-muted); }

  .notes-meta {
    font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em;
    white-space: nowrap; padding-left: 12px;
    flex-shrink: 0;
  }

  .notes-toolbar {
    padding: 8px 14px;
    display: flex; align-items: center; gap: 4px;
    border-bottom: 1px solid var(--glass-border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .tool-btn {
    padding: 5px 10px; border-radius: 6px;
    background: none; border: none;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.04em;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .tool-btn:hover { background: var(--surface-hover); color: var(--text); }
  .tool-btn svg { width: 13px; height: 13px; }
  .tool-btn.active { background: var(--accent-dim); color: var(--accent); }

  .tool-divider {
    width: 1px; height: 16px;
    background: var(--glass-border); margin: 0 4px;
  }

  #notes-area {
    flex: 1; min-height: 0;
    resize: none; border: none; outline: none;
    background: transparent;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px; line-height: 1.8;
    padding: 18px 20px;
    letter-spacing: 0.02em;
    overflow-y: auto;
    caret-color: var(--accent);
  }
  #notes-area::placeholder { color: var(--text-muted); }
  #notes-area::-webkit-scrollbar { width: 4px; }
  #notes-area::-webkit-scrollbar-track { background: transparent; }
  #notes-area::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

  /* formatted editing */
  #notes-area b { color: var(--accent); }
  #notes-area i { opacity: 0.75; }

  .notes-footer {
    padding: 10px 18px;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--glass-border);
    flex-shrink: 0;
  }

  .word-count {
    font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em;
  }

  /* ── SESSIONS SIDEBAR ── */
  .sessions-drawer {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 300px;
    background: rgba(10,10,14,0.92);
    backdrop-filter: blur(30px);
    border-right: 1px solid var(--glass-border);
    z-index: 100;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
    padding: 20px 0;
  }
  .sessions-drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 0 20px 16px;
    border-bottom: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .drawer-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 300;
    letter-spacing: 0.04em;
  }
  .drawer-close {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; padding: 4px;
  }
  .drawer-close svg { width: 16px; height: 16px; }

  .sessions-list {
    flex: 1; overflow-y: auto; padding: 12px 12px;
  }
  .sessions-list::-webkit-scrollbar { width: 3px; }
  .sessions-list::-webkit-scrollbar-thumb { background: var(--glass-border); }

  .session-item {
    padding: 12px 14px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background 0.15s;
    margin-bottom: 4px;
    border: 1px solid transparent;
  }
  .session-item:hover { background: var(--surface-hover); border-color: var(--glass-border); }
  .session-item.active { background: var(--accent-dim); border-color: rgba(200,240,160,0.25); }
  .session-item .s-title {
    font-size: 13px; color: var(--text); margin-bottom: 4px;
    font-family: 'Cormorant Garamond', serif; font-size: 15px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .session-item .s-meta {
    font-size: 10px; color: var(--text-muted); letter-spacing: 0.05em;
    display: flex; gap: 10px;
  }

  .new-session-btn {
    margin: 0 12px 12px;
    padding: 11px; border-radius: var(--radius-sm);
    background: var(--surface); border: 1px dashed var(--glass-border);
    color: var(--text-dim); font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.06em;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .new-session-btn:hover { background: var(--surface-hover); border-color: var(--glass-border-bright); color: var(--text); }

  /* drawer scrim */
  .scrim {
    position: fixed; inset: 0; z-index: 99;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(2px);
    display: none;
  }
  .scrim.visible { display: block; }

  /* ── EXPORT TOAST ── */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: rgba(18,18,22,0.95); backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border-bright);
    border-radius: 100px; padding: 10px 22px;
    font-size: 12px; color: var(--text); letter-spacing: 0.05em;
    z-index: 200; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── PINCH ZOOM HINT ── */
  .zoom-hint {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(6px);
    border: 1px solid var(--glass-border);
    border-radius: 100px; padding: 4px 10px;
    font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  /* ── FOCUS MODE ── */
  #app.focus-left .right-panel { display: none; }
  #app.focus-left .left-panel { width: 100%; }
  #app.focus-right .left-panel { display: none; }
  #app.focus-right .right-panel { flex: 1; }

  /* ripple on shutter */
  @keyframes shutterFlash {
    0% { opacity: 0; }
    10% { opacity: 0.4; }
    100% { opacity: 0; }
  }
  .flash {
    position: absolute; inset: 0;
    background: white; pointer-events: none;
    animation: shutterFlash 0.35s ease-out forwards;
    border-radius: var(--radius);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }
  .photo-viewer, .right-panel, .thumb-strip, header {
    animation: fadeIn 0.4s ease both;
  }
  header { animation-delay: 0.05s; }
  .photo-viewer { animation-delay: 0.1s; }
  .thumb-strip { animation-delay: 0.15s; }
  .right-panel { animation-delay: 0.12s; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">Board<span>Notes</span></div>
    <div class="header-actions">
      <button class="pill-btn" id="sessions-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
        </svg>
        Sessions
      </button>
      <button class="pill-btn" id="camera-btn" onclick="openCamera()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Capture
      </button>
      <button class="pill-btn accent" id="export-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT: Camera / Photo -->
    <div class="left-panel">
      <div class="photo-viewer" id="photo-viewer">
        <div class="empty-state" id="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <p>tap capture to photograph the board</p>
        </div>

        <img id="photo-display" draggable="false" alt="Board photo">

        <div class="zoom-badge" id="zoom-badge">100%</div>
        <div class="zoom-hint" id="zoom-hint">pinch to zoom</div>

        <!-- Camera overlay -->
        <div id="camera-overlay">
          <video id="camera-video" autoplay playsinline muted></video>
          <button class="cam-cancel-btn" onclick="closeCamera()">Cancel</button>
          <div class="camera-controls">
            <button class="shutter-btn" id="shutter-btn" onclick="capturePhoto()"></button>
          </div>
        </div>
      </div>

      <!-- Thumbnail strip -->
      <div class="thumb-strip" id="thumb-strip">
        <span class="empty-label" id="strip-empty">No photos yet</span>
      </div>
    </div>

    <!-- RIGHT: Notes -->
    <div class="right-panel">
      <div class="notes-header">
        <input class="notes-title-input" id="notes-title" placeholder="Session title..." maxlength="60">
        <span class="notes-meta" id="notes-meta">—</span>
      </div>

      <div class="notes-toolbar">
        <button class="tool-btn" onclick="formatText('bold')" title="Bold">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
          Bold
        </button>
        <button class="tool-btn" onclick="formatText('italic')" title="Italic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
          Italic
        </button>
        <div class="tool-divider"></div>
        <button class="tool-btn" onclick="insertLine('— ')" title="List item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          List
        </button>
        <button class="tool-btn" onclick="insertLine('## ')" title="Heading">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h16M4 6h16M4 18h10"/></svg>
          Heading
        </button>
        <button class="tool-btn" onclick="insertLine('[ ] ')" title="Task">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Task
        </button>
        <div class="tool-divider"></div>
        <button class="tool-btn" onclick="clearNotes()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Clear
        </button>
      </div>

      <textarea id="notes-area" placeholder="Start writing your notes here...&#10;&#10;The board photo is on the left — zoom in on any part you need.&#10;Pinch to zoom on the image."></textarea>

      <div class="notes-footer">
        <span class="word-count" id="word-count">0 words</span>
        <div style="display:flex;gap:8px;">
          <button class="pill-btn" onclick="copyNotes()" style="padding:5px 12px;font-size:10px;">Copy text</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Sessions Drawer -->
<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="sessions-drawer" id="sessions-drawer">
  <div class="drawer-header">
    <span class="drawer-title">Sessions</span>
    <button class="drawer-close" onclick="closeDrawer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <button class="new-session-btn" onclick="newSession()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New Session
  </button>
  <div class="sessions-list" id="sessions-list"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let sessions = JSON.parse(localStorage.getItem('bn_sessions') || '[]');
let currentSessionId = null;
let cameraStream = null;
let photos = []; // { id, dataUrl, timestamp }
let activePhotoId = null;

// pinch zoom
let scale = 1, lastDist = 0, translateX = 0, translateY = 0;
let isDragging = false, lastTouchX = 0, lastTouchY = 0, touchStartX = 0, touchStartY = 0;
const MIN_SCALE = 1, MAX_SCALE = 6;

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  if (sessions.length === 0) {
    newSession(false);
  } else {
    loadSession(sessions[0].id);
  }
  renderSessionsList();
  updateMeta();
});

// ── SESSIONS ──
function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function newSession(open = true) {
  const id = generateId();
  const session = {
    id, title: '', notes: '',
    photos: [],
    created: Date.now()
  };
  sessions.unshift(session);
  saveSessions();
  loadSession(id);
  renderSessionsList();
  if (open) { closeDrawer(); }
}

function loadSession(id) {
  // save current first
  if (currentSessionId) saveCurrentSession();

  currentSessionId = id;
  const s = sessions.find(x => x.id === id);
  if (!s) return;

  document.getElementById('notes-title').value = s.title || '';
  document.getElementById('notes-area').value = s.notes || '';
  photos = (s.photos || []).map(p => ({...p}));
  activePhotoId = photos.length > 0 ? photos[photos.length - 1].id : null;

  renderThumbs();
  if (activePhotoId) showPhoto(activePhotoId);
  else clearPhotoView();

  updateMeta();
  updateWordCount();
  renderSessionsList();
}

function saveCurrentSession() {
  if (!currentSessionId) return;
  const idx = sessions.findIndex(x => x.id === currentSessionId);
  if (idx < 0) return;
  sessions[idx].title = document.getElementById('notes-title').value;
  sessions[idx].notes = document.getElementById('notes-area').value;
  sessions[idx].photos = photos.map(p => ({...p}));
  saveSessions();
}

function saveSessions() {
  // save without large photo data if quota issues — keep photos separate
  try {
    localStorage.setItem('bn_sessions', JSON.stringify(sessions));
  } catch(e) {
    // storage full — trim oldest photos
    showToast('Storage full — old photos trimmed');
  }
}

function renderSessionsList() {
  const list = document.getElementById('sessions-list');
  list.innerHTML = '';
  sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
    const d = new Date(s.created);
    const dateStr = d.toLocaleDateString('en-IE', { day:'numeric', month:'short' });
    const timeStr = d.toLocaleTimeString('en-IE', { hour:'2-digit', minute:'2-digit' });
    const photoCount = (s.photos || []).length;
    const wordCount = s.notes ? s.notes.trim().split(/\s+/).filter(Boolean).length : 0;
    div.innerHTML = `
      <div class="s-title">${s.title || 'Untitled session'}</div>
      <div class="s-meta">
        <span>${dateStr} ${timeStr}</span>
        <span>${photoCount} photo${photoCount !== 1 ? 's' : ''}</span>
        <span>${wordCount}w</span>
      </div>`;
    div.addEventListener('click', () => { loadSession(s.id); closeDrawer(); });
    list.appendChild(div);
  });
}

// ── CAMERA ──
async function openCamera() {
  const overlay = document.getElementById('camera-overlay');
  overlay.classList.add('active');
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 3840 }, height: { ideal: 2160 } },
      audio: false
    });
    document.getElementById('camera-video').srcObject = cameraStream;
  } catch(e) {
    overlay.classList.remove('active');
    showToast('Camera access denied — check browser settings');
  }
}

function closeCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  document.getElementById('camera-video').srcObject = null;
  document.getElementById('camera-overlay').classList.remove('active');
}

function capturePhoto() {
  const video = document.getElementById('camera-video');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.92);

  // flash
  const flash = document.createElement('div');
  flash.className = 'flash';
  document.getElementById('photo-viewer').appendChild(flash);
  setTimeout(() => flash.remove(), 400);

  const photo = { id: generateId(), dataUrl, timestamp: Date.now() };
  photos.push(photo);
  activePhotoId = photo.id;

  renderThumbs();
  showPhoto(photo.id);
  saveCurrentSession();
  closeCamera();
  showToast('Photo captured');
}

// ── PHOTOS ──
function showPhoto(id) {
  const photo = photos.find(p => p.id === id);
  if (!photo) return;
  activePhotoId = id;
  const img = document.getElementById('photo-display');
  img.src = photo.dataUrl;
  img.style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('zoom-hint').style.opacity = '1';
  resetZoom();
  renderThumbs();
  setTimeout(() => {
    document.getElementById('zoom-hint').style.opacity = '0';
  }, 3000);
}

function clearPhotoView() {
  const img = document.getElementById('photo-display');
  img.style.display = 'none';
  img.src = '';
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('zoom-badge').style.display = 'none';
  document.getElementById('zoom-hint').style.opacity = '0';
}

function deletePhoto(id, e) {
  e.stopPropagation();
  photos = photos.filter(p => p.id !== id);
  if (activePhotoId === id) {
    activePhotoId = photos.length > 0 ? photos[photos.length - 1].id : null;
    if (activePhotoId) showPhoto(activePhotoId);
    else clearPhotoView();
  }
  renderThumbs();
  saveCurrentSession();
}

function renderThumbs() {
  const strip = document.getElementById('thumb-strip');
  const emptyLabel = document.getElementById('strip-empty');
  strip.innerHTML = '';

  if (photos.length === 0) {
    const el = document.createElement('span');
    el.className = 'empty-label';
    el.id = 'strip-empty';
    el.textContent = 'No photos yet';
    strip.appendChild(el);
    return;
  }

  photos.forEach(p => {
    const wrap = document.createElement('div');
    wrap.className = 'thumb-wrapper';

    const img = document.createElement('img');
    img.className = 'thumb' + (p.id === activePhotoId ? ' active' : '');
    img.src = p.dataUrl;
    img.addEventListener('click', () => showPhoto(p.id));

    const del = document.createElement('button');
    del.className = 'thumb-delete';
    del.innerHTML = '✕';
    del.addEventListener('click', (e) => deletePhoto(p.id, e));

    wrap.appendChild(img);
    wrap.appendChild(del);
    strip.appendChild(wrap);
  });
}

// ── PINCH ZOOM ──
const photoViewer = document.getElementById('photo-viewer');
const photoImg = document.getElementById('photo-display');

function getDistance(t1, t2) {
  return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
}

function applyTransform(animated) {
  const tr = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
  photoImg.style.transition = animated ? 'transform 0.2s ease' : '';
  photoImg.style.transform = tr;

  const badge = document.getElementById('zoom-badge');
  badge.style.display = scale > 1.05 ? 'block' : 'none';
  badge.textContent = Math.round(scale * 100) + '%';
}

function resetZoom() {
  scale = 1; translateX = 0; translateY = 0;
  applyTransform(true);
}

function clampTranslation() {
  if (scale <= 1) { translateX = 0; translateY = 0; return; }
  const rect = photoViewer.getBoundingClientRect();
  const maxX = (rect.width * (scale - 1)) / 2;
  const maxY = (rect.height * (scale - 1)) / 2;
  translateX = Math.max(-maxX, Math.min(maxX, translateX));
  translateY = Math.max(-maxY, Math.min(maxY, translateY));
}

photoViewer.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    lastDist = getDistance(e.touches[0], e.touches[1]);
    e.preventDefault();
  } else if (e.touches.length === 1 && scale > 1) {
    isDragging = true;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    e.preventDefault();
  }
}, { passive: false });

photoViewer.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    const dist = getDistance(e.touches[0], e.touches[1]);
    const delta = dist / lastDist;
    scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * delta));
    lastDist = dist;
    clampTranslation();
    applyTransform(false);
    e.preventDefault();
  } else if (e.touches.length === 1 && isDragging && scale > 1) {
    translateX += e.touches[0].clientX - lastTouchX;
    translateY += e.touches[0].clientY - lastTouchY;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    clampTranslation();
    applyTransform(false);
    e.preventDefault();
  }
}, { passive: false });

photoViewer.addEventListener('touchend', (e) => {
  isDragging = false;
  if (scale < 1.05) resetZoom();
});

// double tap to reset
let lastTap = 0;
photoViewer.addEventListener('touchend', (e) => {
  if (e.touches.length === 0) {
    const now = Date.now();
    if (now - lastTap < 280) {
      if (scale > 1.1) resetZoom();
      else { scale = 2.5; applyTransform(true); }
    }
    lastTap = now;
  }
});

// ── NOTES ──
const notesArea = document.getElementById('notes-area');

notesArea.addEventListener('input', () => {
  updateWordCount();
  debouncedSave();
});

document.getElementById('notes-title').addEventListener('input', debouncedSave);

let saveTimer;
function debouncedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveCurrentSession();
    renderSessionsList();
  }, 600);
}

function updateWordCount() {
  const text = notesArea.value.trim();
  const words = text ? text.split(/\s+/).filter(Boolean).length : 0;
  const lines = text ? text.split('\n').length : 0;
  document.getElementById('word-count').textContent = `${words} words · ${lines} lines`;
}

function updateMeta() {
  const s = sessions.find(x => x.id === currentSessionId);
  if (!s) return;
  const d = new Date(s.created);
  document.getElementById('notes-meta').textContent =
    d.toLocaleDateString('en-IE', { weekday:'short', day:'numeric', month:'short' }) + ' ' +
    d.toLocaleTimeString('en-IE', { hour:'2-digit', minute:'2-digit' });
}

function formatText(type) {
  const ta = notesArea;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel = ta.value.substring(start, end);
  if (!sel) return;
  const map = { bold: `**${sel}**`, italic: `_${sel}_` };
  const replacement = map[type];
  ta.setRangeText(replacement, start, end, 'select');
  ta.focus();
}

function insertLine(prefix) {
  const ta = notesArea;
  const pos = ta.selectionStart;
  const before = ta.value.substring(0, pos);
  const after = ta.value.substring(pos);
  const needsNewline = before.length > 0 && !before.endsWith('\n');
  const insert = (needsNewline ? '\n' : '') + prefix;
  ta.value = before + insert + after;
  const newPos = pos + insert.length;
  ta.setSelectionRange(newPos, newPos);
  ta.focus();
  updateWordCount();
}

function clearNotes() {
  if (!notesArea.value.trim()) return;
  if (confirm('Clear all notes for this session?')) {
    notesArea.value = '';
    updateWordCount();
    saveCurrentSession();
  }
}

// ── EXPORT ──
document.getElementById('export-btn').addEventListener('click', exportSession);

function exportSession() {
  saveCurrentSession();
  const s = sessions.find(x => x.id === currentSessionId);
  if (!s) return;

  const title = s.title || 'BoardNotes Export';
  const date = new Date(s.created).toLocaleString('en-IE');
  const text = `${title}\n${date}\n${'─'.repeat(40)}\n\n${s.notes || '(no notes)'}`;

  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${title.replace(/\s+/g,'-')}.txt`;
  a.click(); URL.revokeObjectURL(url);
  showToast('Notes exported as .txt');
}

function copyNotes() {
  const text = notesArea.value;
  if (!text.trim()) { showToast('Nothing to copy'); return; }
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
}

// ── DRAWER ──
document.getElementById('sessions-btn').addEventListener('click', () => {
  saveCurrentSession();
  renderSessionsList();
  document.getElementById('sessions-drawer').classList.add('open');
  document.getElementById('scrim').classList.add('visible');
});

function closeDrawer() {
  document.getElementById('sessions-drawer').classList.remove('open');
  document.getElementById('scrim').classList.remove('visible');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// auto-save on page hide
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') saveCurrentSession();
});
window.addEventListener('pagehide', saveCurrentSession);

// keyboard shortcut: Cmd/Ctrl+S
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    saveCurrentSession();
    showToast('Saved');
  }
});
</script>
</body>
</html>
