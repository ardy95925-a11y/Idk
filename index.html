<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>LUMIÈRE — Pro Camera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080808;
      --surface:   #101010;
      --border:    rgba(255,255,255,0.07);
      --gold:      #c9a96e;
      --gold-dim:  rgba(201,169,110,0.25);
      --white:     #f0ece4;
      --dim:       rgba(240,236,228,0.45);
      --red:       #e05252;
      --green:     #52c07a;
      --radius:    18px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
      touch-action: none;
    }

    /* ── APP SHELL ── */
    #app {
      display: grid;
      grid-template-rows: 56px 1fr 140px;
      height: 100dvh;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── TOP BAR ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,8,0.9);
      backdrop-filter: blur(16px);
      z-index: 10;
    }
    #topbar .brand {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.22em;
      font-size: 22px;
      color: var(--gold);
    }
    #topbar .meta {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .rec-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--red); margin-right:6px; animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .rec-dot.idle { background: var(--dim); animation: none; }

    /* ── VIEWFINDER ── */
    #viewfinder-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    #viewfinder {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* The live canvas that shows camera + filter */
    #liveCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Hidden video source */
    #videoSource {
      display: none;
    }

    /* Overlay grid / reticle */
    #reticle {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    #reticle svg { width:100%; height:100%; }

    /* Corner brackets */
    .corner {
      position: absolute;
      width: 32px; height: 32px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.7;
    }
    .corner.tl { top:20px; left:20px; border-width:2px 0 0 2px; }
    .corner.tr { top:20px; right:20px; border-width:2px 2px 0 0; }
    .corner.bl { bottom:20px; left:20px; border-width:0 0 2px 2px; }
    .corner.br { bottom:20px; right:20px; border-width:0 2px 2px 0; }

    /* Focus ring */
    #focusRing {
      position: absolute;
      width: 80px; height: 80px;
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.2s, width 0.15s, height 0.15s;
    }
    #focusRing.active { opacity: 1; }

    /* HUD overlays */
    #hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .hud-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .hud-badge {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--dim);
    }
    .hud-badge span { color: var(--white); }
    #filterLabel {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-style: italic;
      color: var(--gold);
      letter-spacing: 0.06em;
    }

    /* Histogram bar */
    #histogram {
      width: 80px;
      height: 36px;
      opacity: 0.6;
    }

    /* Zoom indicator */
    #zoomBar {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 11px;
      color: var(--white);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #zoomBar.show { opacity: 1; }
    #zoomVal { color: var(--gold); }

    /* No-camera overlay */
    #noCameraMsg {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #000;
      z-index: 5;
    }
    #noCameraMsg .icon { font-size: 48px; opacity: 0.3; }
    #noCameraMsg p { font-size: 12px; color: var(--dim); text-align: center; line-height: 1.6; max-width: 260px; }
    #startCamBtn {
      margin-top: 8px;
      padding: 12px 32px;
      border: 1.5px solid var(--gold);
      border-radius: 40px;
      background: transparent;
      color: var(--gold);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #startCamBtn:hover { background: var(--gold-dim); }

    /* ── BOTTOM PANEL ── */
    #bottomPanel {
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-rows: 56px 1fr;
      overflow: hidden;
    }

    /* Filter strip */
    #filterStrip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    #filterStrip::-webkit-scrollbar { display:none; }

    .filter-btn {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 10px;
      border: 1.5px solid transparent;
      transition: border-color 0.2s, background 0.2s;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-btn.active {
      border-color: var(--gold);
      background: var(--gold-dim);
    }
    .filter-thumb {
      width: 38px; height: 38px;
      border-radius: 8px;
      overflow: hidden;
      background: #1a1a1a;
    }
    .filter-thumb canvas { width: 38px; height: 38px; }
    .filter-name {
      font-size: 9px;
      letter-spacing: 0.08em;
      color: var(--dim);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .filter-btn.active .filter-name { color: var(--gold); }

    /* Controls row */
    #controls {
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 24px;
    }

    /* Gallery thumb */
    #galleryThumb {
      width: 52px; height: 52px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: #1a1a1a;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }
    #galleryThumb:hover { border-color: var(--gold); }
    #galleryThumb img { width:100%; height:100%; object-fit:cover; }
    #galleryThumb .placeholder { display:flex; align-items:center; justify-content:center; height:100%; color:var(--dim); font-size:20px; }

    /* Shutter */
    #shutter {
      width: 78px; height: 78px;
      border-radius: 50%;
      background: transparent;
      border: 3px solid var(--white);
      display: flex; align-items:center; justify-content:center;
      cursor: pointer;
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    #shutter:active { transform: scale(0.92); }
    #shutter .inner {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: var(--white);
      transition: background 0.1s, transform 0.1s;
    }
    #shutter:active .inner { background: #ccc; transform: scale(0.95); }

    /* Flip camera */
    #flipBtn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.05);
      display: flex; align-items:center; justify-content:center;
      cursor: pointer;
      font-size: 22px;
      transition: background 0.2s, transform 0.3s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    #flipBtn:active { background: rgba(255,255,255,0.12); transform: rotate(180deg); }

    /* ── FLASH EFFECT ── */
    #flashOverlay {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.05s;
    }
    #flashOverlay.flash { opacity: 0.9; }

    /* ── GALLERY MODAL ── */
    #gallery {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      display: none;
      flex-direction: column;
    }
    #gallery.open { display: flex; }
    #galleryHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    #galleryHeader h2 {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.15em;
      font-size: 20px;
      color: var(--gold);
    }
    #closeGallery {
      background: none; border: none; color: var(--dim);
      font-size: 24px; cursor: pointer;
      padding: 4px 8px;
    }
    #galleryGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 4px;
      padding: 12px;
      overflow-y: auto;
      flex: 1;
    }
    .gallery-img {
      aspect-ratio: 3/4;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    .gallery-img:hover { transform: scale(1.02); opacity: 0.85; }
    #emptyGallery {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--dim);
      font-size: 12px;
    }
    #emptyGallery.show { display: flex; }

    /* ── LIGHTBOX ── */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.97);
      z-index: 200;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightboxImg {
      max-width: 90vw;
      max-height: 80vh;
      border-radius: 12px;
      object-fit: contain;
    }
    #lightboxActions {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }
    .lb-btn {
      padding: 10px 24px;
      border-radius: 30px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .lb-btn.primary { background: var(--gold); color: #000; border: none; }
    .lb-btn.primary:hover { background: #d4b47c; }
    .lb-btn.ghost { background: transparent; color: var(--dim); border: 1.5px solid var(--border); }
    .lb-btn.ghost:hover { border-color: var(--dim); color: var(--white); }
    #closeLightbox {
      position: absolute;
      top: 20px; right: 20px;
      background: none; border: none;
      color: var(--dim); font-size: 28px; cursor: pointer;
    }

    /* ── EXPOSURE SLIDER ── */
    #exposureWrap {
      position: absolute;
      right: 14px; top: 50%; transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 4;
    }
    #exposureWrap label {
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 0.1em;
      writing-mode: vertical-lr;
      transform: rotate(180deg);
      text-transform: uppercase;
    }
    #exposureSlider {
      -webkit-appearance: slider-vertical;
      appearance: slider-vertical;
      width: 6px;
      height: 100px;
      accent-color: var(--gold);
      cursor: pointer;
      background: var(--border);
    }
    #exposureVal {
      font-size: 9px;
      color: var(--gold);
    }

    /* Subtle scanline texture */
    #scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      z-index: 3;
    }

    /* Mode tabs */
    #modeTabs {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 4px;
      z-index: 4;
    }
    .mode-tab {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
      border: none;
      background: transparent;
    }
    .mode-tab.active { background: var(--gold); color: #000; }

    /* Shutter animation ring */
    #shutterRipple {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }
    .ripple-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid var(--gold);
      transform: translate(-50%, -50%) scale(0);
      opacity: 0.8;
      animation: rippleOut 0.6s ease-out forwards;
    }
    @keyframes rippleOut {
      to { transform: translate(-50%, -50%) scale(8); opacity: 0; }
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 160px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 8px 20px;
      font-size: 11px;
      color: var(--white);
      letter-spacing: 0.08em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 50;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* iPad landscape adjustments */
    @media (orientation: landscape) and (min-width: 768px) {
      #app {
        grid-template-columns: 1fr 280px;
        grid-template-rows: 56px 1fr;
      }
      #topbar { grid-column: 1 / -1; }
      #viewfinder-wrap { grid-row: 2; }
      #bottomPanel {
        grid-row: 2;
        grid-template-rows: 1fr 56px;
        border-top: none;
        border-left: 1px solid var(--border);
      }
      #filterStrip {
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        border-bottom: none;
        border-right: 1px solid var(--border);
        padding: 20px 0;
        align-items: center;
        height: 100%;
      }
      #controls {
        flex-direction: row;
        border-top: 1px solid var(--border);
        padding: 0 16px;
      }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="brand">LUMIÈRE</div>
    <div class="meta">
      <span class="rec-dot idle" id="recDot"></span>
      <span id="modeLabel">PHOTO</span>
    </div>
    <div class="meta" id="timeDisplay"></div>
  </div>

  <!-- VIEWFINDER -->
  <div id="viewfinder-wrap">
    <div id="viewfinder">

      <!-- No camera placeholder -->
      <div id="noCameraMsg">
        <div class="icon">📷</div>
        <p>Enable camera access to begin shooting with LUMIÈRE's advanced rendering engine.</p>
        <button id="startCamBtn">OPEN CAMERA</button>
      </div>

      <video id="videoSource" autoplay playsinline muted></video>
      <canvas id="liveCanvas"></canvas>

      <!-- Scanlines -->
      <div id="scanlines"></div>

      <!-- Corners -->
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <!-- Focus ring -->
      <div id="focusRing"></div>

      <!-- Shutter ripple layer -->
      <div id="shutterRipple"></div>

      <!-- HUD -->
      <div id="hud">
        <div class="hud-row">
          <div class="hud-badge">ISO <span id="isoVal">400</span></div>
          <div class="hud-badge">f/<span id="apertureVal">1.8</span></div>
          <div class="hud-badge"><span id="ssVal">1/60</span>s</div>
        </div>
        <div class="hud-row" style="align-items:center; justify-content:center;">
          <div id="filterLabel">Natural</div>
        </div>
        <div class="hud-row">
          <canvas id="histogram" width="80" height="36"></canvas>
          <div class="hud-badge">
            <span id="resLabel">4:3</span>
          </div>
        </div>
      </div>

      <!-- Mode tabs -->
      <div id="modeTabs">
        <button class="mode-tab active" data-mode="photo">Photo</button>
        <button class="mode-tab" data-mode="portrait">Portrait</button>
        <button class="mode-tab" data-mode="noir">Noir</button>
        <button class="mode-tab" data-mode="burst">Burst</button>
      </div>

      <!-- Zoom -->
      <div id="zoomBar">🔍 <span id="zoomVal">1.0</span>×</div>

      <!-- Exposure -->
      <div id="exposureWrap">
        <label>EV</label>
        <input type="range" id="exposureSlider" min="-2" max="2" step="0.1" value="0" orient="vertical" />
        <div id="exposureVal">0</div>
      </div>

    </div>
  </div>

  <!-- BOTTOM PANEL -->
  <div id="bottomPanel">

    <!-- Filter strip -->
    <div id="filterStrip">
      <!-- Populated by JS -->
    </div>

    <!-- Controls -->
    <div id="controls">
      <div id="galleryThumb" title="Gallery">
        <div class="placeholder">🖼</div>
      </div>

      <div id="shutter" title="Take Photo">
        <div class="inner"></div>
      </div>

      <div id="flipBtn" title="Flip Camera">↩</div>
    </div>

  </div>

</div>

<!-- Flash -->
<div id="flashOverlay"></div>

<!-- Toast -->
<div id="toast"></div>

<!-- Gallery Modal -->
<div id="gallery">
  <div id="galleryHeader">
    <h2>SHOTS</h2>
    <button id="closeGallery">✕</button>
  </div>
  <div id="galleryGrid"></div>
  <div id="emptyGallery"><span style="font-size:40px;opacity:.2">📭</span><span>No photos yet</span></div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="closeLightbox">✕</button>
  <img id="lightboxImg" src="" alt="captured photo" />
  <div id="lightboxActions">
    <button class="lb-btn primary" id="downloadBtn">SAVE PHOTO</button>
    <button class="lb-btn ghost" id="deleteLbBtn">DELETE</button>
  </div>
</div>

<script src="camera.js"></script>
</body>
</html>
